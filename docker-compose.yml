services:
  postgres:
    image: postgres:16-alpine
    container_name: miniwallet-postgres
    environment:
      POSTGRES_USER: miniwallet
      POSTGRES_PASSWORD: miniwallet
      POSTGRES_DB: miniwallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniwallet -d miniwallet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miniwallet-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: miniwallet-api
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://miniwallet:miniwallet@postgres:5432/miniwallet?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-env}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - miniwallet-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: miniwallet-web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    networks:
      - miniwallet-network

volumes:
  postgres_data:

networks:
  miniwallet-network:
    driver: bridge
